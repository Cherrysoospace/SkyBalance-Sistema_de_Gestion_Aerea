<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacion - SKYBALANCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/styles/common.css">
    <link rel="stylesheet" href="../src/styles/navbar.css">
    <link rel="stylesheet" href="../src/styles/simulacion.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-logo">
                <img src="../assets/images/plane.svg" alt="Logo">
                <span>SKYBALANCE</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="gestion-nodos.html">Gestion Nodos</a></li>
                <li><a href="comparacion.html">Comparison (BST vs AVL)</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="simulacion-container">
        <section class="content">
            <h1>Simulación</h1>
            <p>Simula operaciones complejas sobre el árbol AVL</p>

            <div class="controls">
                <button id="btn-cargar-datos" class="btn btn-primary">Cargar Datos Ejemplo</button>
                <button id="btn-simular" class="btn btn-primary">Ejecutar Simulación</button>
                <button id="btn-limpiar" class="btn btn-secondary">Limpiar</button>
            </div>

            <section class="queue-section">
                <h2>Encolar Vuelo</h2>
                <form id="form-encolar" class="form-encolar">
                    <div class="form-group-inline">
                        <input type="text" id="sim-codigo" placeholder="Código vuelo" required>
                        <input type="text" id="sim-origen" placeholder="Origen" required>
                        <input type="text" id="sim-destino" placeholder="Destino" required>
                    </div>
                    <div class="form-group-inline">
                        <input type="time" id="sim-horaSalida" required>
                        <input type="number" id="sim-pasajeros" placeholder="Pasajeros" required>
                        <input type="number" id="sim-precioBase" placeholder="Precio Base" required>
                    </div>
                    <button type="button" id="btn-encolar" class="btn btn-secondary">Agregar a cola</button>
                </form>

                <h3>Cola Pendiente</h3>
                <div id="queue-list" class="queue-list"></div>

                <button id="btn-procesar-pasos" class="btn btn-primary">Procesar cola</button>
            </section>

            <div id="conflictos" class="conflictos"></div>

            <div class="resultado">
                <div id="logs" class="logs">
                    <!-- Logs de simulación -->
                </div>
            </div>

            <div id="tree-container" class="tree-visualization">
                <!-- SVG del árbol simulado -->
            </div>
        </section>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="../src/shared/navbar.js"></script>
    <script type="module" src="../src/pages/simulacion/simulacion.js"></script>
</body>
</html>
