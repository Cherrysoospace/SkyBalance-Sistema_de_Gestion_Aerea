<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Estres - SKYBALANCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/styles/common.css">
    <link rel="stylesheet" href="../src/styles/navbar.css">
    <link rel="stylesheet" href="../src/styles/modo-estres.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-logo">
                <img src="../assets/images/plane.svg" alt="Logo">
                <span>SKYBALANCE</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="gestion-nodos.html">Gestion Nodos</a></li>
                <li><a href="comparacion.html">Comparison (BST vs AVL)</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="modo-estres-container">
        <section class="content">
            <h1>Modo Estrés</h1>
            <p>Prueba el rendimiento del árbol AVL bajo carga</p>

            <div class="controls">
                <div class="control-group">
                    <label for="cantidad-nodos">Cantidad de Nodos:</label>
                    <input type="number" id="cantidad-nodos" min="1" max="1000" value="100">
                </div>
                <div class="control-group">
                    <label for="velocidad">Velocidad (ms):</label>
                    <input type="range" id="velocidad" min="10" max="1000" value="100">
                </div>
                <button id="btn-iniciar" class="btn btn-primary">Iniciar Prueba</button>
                <button id="btn-detener" class="btn btn-secondary" disabled>Detener</button>

                <div class="control-group">
                    <label>
                        <input type="checkbox" id="toggle-stress-mode">
                        Modo Estrés
                    </label>
                </div>
                <button id="btn-rebalanceo-global" class="btn btn-secondary">Rebalanceo Global</button>
                <button id="btn-auditar" class="btn btn-secondary" disabled>Auditoría AVL</button>
            </div>

            <div class="metrics">
                <div class="metric-box">
                    <span class="label">Inserciones/s:</span>
                    <span id="metric-inserciones" class="value">0</span>
                </div>
                <div class="metric-box">
                    <span class="label">Rotaciones:</span>
                    <span id="metric-rotaciones" class="value">0</span>
                </div>
                <div class="metric-box">
                    <span class="label">Tiempo (ms):</span>
                    <span id="metric-tiempo" class="value">0</span>
                </div>
            </div>

            <div id="audit-report" class="audit-report"></div>
            <div id="rotation-stats" class="rotation-stats">
                <span id="stat-LL">LL: 0</span>
                <span id="stat-RR">RR: 0</span>
                <span id="stat-LR">LR: 0</span>
                <span id="stat-RL">RL: 0</span>
            </div>

            <div id="tree-container" class="tree-visualization">
                <!-- SVG del árbol bajo estrés -->
            </div>
        </section>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="../src/shared/navbar.js"></script>
    <script type="module" src="../src/pages/modo-estres/modo-estres.js"></script>
</body>
</html>
